services:
  socialai-pro:
    build: .
    container_name: socialai-pro
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      # SQLite database (vendors, messages, orders, etc.)
      - ./data:/app/data
      # Platform .env (webhook verify token, JWT secret, super admin)
      - ./.env:/app/.env
      # Live UI + compiled backend (no rebuild needed for dashboard changes)
      - ./public:/app/public
      - ./dist:/app/dist
